include current-theme.conf
font_family      family="Atkinson Hyperlegible Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 15.5

tab_bar_edge top
tab_bar_style fade
tab_bar_filter session:~ or session:^$
tab_bar_min_tabs 1

notify_on_cmd_finish invisible 10

# Tab Navigation
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+t new_tab_with_cwd
map cmd+k next_tab
map cmd+h previous_tab
map cmd+shift+k move_tab_forward

# Session Navigation
map cmd+b>l goto_session

map ctrl+cmd+, load_config_file

# General
allow_remote_control yes
listen_on unix:/tmp/kitty-brad
hide_window_decorations titlebar-only
#background_opacity 0.95
#background_blur 20

# Cursor
cursor_shape block
cursor #89F336

# Shell Integration
shell_integration no-cursor
shell_integration no-title

# Cursor Trail
cursor_trail 1
cursor_trail_decay 0.01 0.5
cursor_trail_start_threshold 0

#### SESSIONS ####
#startup_session $HOME/.config/kitty/kitty-sessions/home.kitty-session

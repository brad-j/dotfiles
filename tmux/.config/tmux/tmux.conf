# Enable mouse support (scroll wheel, click to select pane/window)
set -g mouse on

# Let modern TUIs distinguish modified keys such as Shift/Ctrl/Alt+Enter.
# Pi warns about this when running inside tmux without extended keys enabled.
set -g extended-keys on

# Use a 256-color tmux terminfo entry inside tmux and preserve truecolor from
# modern terminals such as Kitty, WezTerm, iTerm2, Ghostty, and xterm variants.
# This keeps TUIs like pi/nvim from falling back to muddy 16-color output on
# remote Linux hosts.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ",xterm-kitty:RGB"
set -as terminal-overrides ",screen-256color:RGB"
set -as terminal-overrides ",tmux-256color:RGB"

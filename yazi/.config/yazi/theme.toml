# vim:fileencoding=utf-8:foldmethod=marker
# Tokyo Night theme for Yazi
# Palette: https://github.com/folke/tokyonight.nvim

# : Manager {{{

[mgr]
cwd = { fg = "#7dcfff" }

# Hovered
hovered         = { fg = "#c0caf5", bg = "#292e42", bold = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#e0af68", bold = true, italic = true, underline = true }
find_position = { fg = "#bb9af7", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { fg = "#7dcfff", italic = true }

# Marker
marker_copied   = { fg = "#9ece6a", bg = "#9ece6a" }
marker_cut      = { fg = "#f7768e", bg = "#f7768e" }
marker_marked   = { fg = "#7dcfff", bg = "#7dcfff" }
marker_selected = { fg = "#e0af68", bg = "#e0af68" }

# Count
count_copied   = { fg = "#1a1b26", bg = "#9ece6a" }
count_cut      = { fg = "#1a1b26", bg = "#f7768e" }
count_selected = { fg = "#1a1b26", bg = "#e0af68" }

# Border
border_symbol = "│"
border_style  = { fg = "#565f89" }

# Highlighting
syntect_theme = ""

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
inactive = { fg = "#7dcfff", bg = "#292e42" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { fg = "#1a1b26", bg = "#9ece6a", bold = true }
normal_alt  = { fg = "#7dcfff", bg = "#292e42", bold = true }

# Select mode
select_main = { fg = "#1a1b26", bg = "#f7768e", bold = true }
select_alt  = { fg = "#7dcfff", bg = "#292e42", bold = true }

# Unset mode
unset_main = { fg = "#1a1b26", bg = "#7dcfff", bold = true }
unset_alt  = { fg = "#7dcfff", bg = "#292e42", bold = true }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
permissions_s = { fg = "#565f89" }
permissions_t = { fg = "#9ece6a" }
permissions_r = { fg = "#e0af68" }
permissions_w = { fg = "#f7768e" }
permissions_x = { fg = "#7dcfff" }

# Progress
progress_label  = { fg = "#c0caf5", bold = true }
progress_normal = { fg = "#7aa2f7", bg = "#16161e" }
progress_error  = { fg = "#f7768e", bg = "#16161e" }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#1a1b26" }
cand            = { fg = "#7dcfff" }
rest            = { fg = "#565f89" }
desc            = { fg = "#bb9af7" }
separator       = "  "
separator_style = { fg = "#565f89" }

# : }}}


# : Confirmation {{{

[confirm]
border     = { fg = "#7aa2f7" }
title      = { fg = "#7dcfff", bold = true }
body       = { fg = "#c0caf5" }
list       = { fg = "#c0caf5" }
btn_yes    = { fg = "#1a1b26", bg = "#9ece6a", bold = true }
btn_no     = { fg = "#c0caf5", bg = "#292e42" }
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "#7aa2f7" }
title  = { fg = "#7dcfff", bold = true }

# Table
tbl_col  = { fg = "#7dcfff" }
tbl_cell = { fg = "#e0af68", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#9ece6a" }
title_warn  = { fg = "#e0af68" }
title_error = { fg = "#f7768e" }

# Icons
icon_info  = ""
icon_warn  = ""
icon_error = ""

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#7aa2f7" }
active   = { fg = "#bb9af7", bold = true }
inactive = { fg = "#565f89" }

# : }}}


# : Input {{{

[input]
border   = { fg = "#7aa2f7" }
title    = { fg = "#7dcfff", bold = true }
value    = { fg = "#c0caf5" }
selected = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#7aa2f7" }
active   = { fg = "#c0caf5", bg = "#292e42", bold = true }
inactive = { fg = "#565f89" }

# Icons
icon_file    = ""
icon_folder  = ""
icon_command = ""

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#7aa2f7" }
title   = { fg = "#7dcfff", bold = true }
hovered = { fg = "#bb9af7", underline = true }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#7dcfff" }
run     = { fg = "#bb9af7" }
desc    = { fg = "#c0caf5" }
hovered = { fg = "#c0caf5", bg = "#292e42", bold = true }
footer  = { fg = "#1a1b26", bg = "#c0caf5" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#7dcfff" },

	# Media
	{ mime = "{audio,video}/*", fg = "#bb9af7" },

	# Archives
	{ mime = "application/*zip", fg = "#f7768e" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#f7768e" },

	# Documents
	{ mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#7aa2f7" },

	# Fallback
	{ url = "*", fg = "#c0caf5" },
	{ url = "*/", fg = "#9ece6a" }
]

# : }}}
